version: "3.9"
services:
  node-control-plane:
    image: node:20-alpine
    working_dir: /app
    command: sh -lc "npm install && npm run dev"
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgres://postgres:postgres@db:5432/ai_trade
      - REDIS_URL=redis://redis:6379
      - AI_ENGINE_URL=http://ai-engine:8080
      - TZ=Asia/Jakarta
    volumes:
      - ./:/app
    depends_on:
      - db
      - redis
      - ai-engine
  ai-engine:
    build:
      context: ./ai-engine
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - DATABASE_URL=${DATABASE_URL}
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ai_trade
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
volumes:
  pg_data:
